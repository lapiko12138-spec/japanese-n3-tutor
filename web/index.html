<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本語学習 · 学习管理后台</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-jp">日本語</div>
        <div class="brand-sub">学習管理 · N5 → N3</div>
      </div>
      <nav id="nav">
        <a href="#home" data-view="home"><span class="ic">🏠</span>首页</a>
        <a href="#map" data-view="map"><span class="ic">🗺️</span>课程地图</a>
        <a href="#today" data-view="today"><span class="ic">📖</span>今日课程</a>
        <a href="#grammar" data-view="grammar"><span class="ic">📐</span>语法库</a>
        <a href="#vocab" data-view="vocab"><span class="ic">🈯</span>单词库</a>
        <a href="#errors" data-view="errors"><span class="ic">❌</span>错题本</a>
        <a href="#tests" data-view="tests"><span class="ic">📝</span>测试记录</a>
        <a href="#analytics" data-view="analytics"><span class="ic">📊</span>学习分析</a>
        <a href="#reviews" data-view="reviews"><span class="ic">🔁</span>复习计划</a>
      </nav>
      <div class="sidebar-foot">
        <div class="foot-note">教学在 <b>Claude Code 对话框</b> 进行<br/>本网站仅<b>只读展示</b>学习数据</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div id="topbar-left" class="topbar-left">加载中…</div>
        <div id="topbar-right" class="topbar-right"></div>
      </header>
      <section id="view" class="view">
        <div class="loading">正在读取本地学习数据…</div>
      </section>
      <footer class="page-foot">数据源:<code>/data/*.json</code> · 由 Claude Code 在对话中维护 · 本页面不含 AI 对话框</footer>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>

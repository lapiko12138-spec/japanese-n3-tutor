<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆卡 · Ⅰ类例外动词(帰る・入る・走る・要る・知る)</title>
  <style>
    :root{ --bg:#f6f4ef; --ink:#2b3a67; --muted:#6b7280; --accent:#d9534f; --card:#fff; --line:#e5e1d8; }
    *{box-sizing:border-box}
    body{font-family:system-ui,"PingFang SC","Hiragino Sans",sans-serif;background:var(--bg);color:var(--ink);margin:0;padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:18px}
    .head{max-width:1040px;width:100%;text-align:center}
    .head h1{font-size:22px;margin:0 0 6px}
    .head p{margin:0;color:var(--muted);font-size:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;max-width:1040px;width:100%;padding:18px 16px;box-shadow:0 6px 20px rgba(43,58,103,.06)}
    .story{max-width:1040px;width:100%;background:#fff7ef;border:1px dashed #e8c9a8;border-radius:14px;padding:14px 18px;font-size:16px;line-height:1.9}
    .story b{color:var(--accent)}
    .story .kana{color:var(--muted);font-size:13px}
    .rule{max-width:1040px;width:100%;background:#eef3ff;border:1px solid #cdd9f5;border-radius:14px;padding:14px 18px;font-size:15px;line-height:1.8}
    .rule b{color:#2b50c0}
    svg{width:100%;height:auto;display:block}
    .back{max-width:1040px;width:100%;font-size:13px}
    .back a{color:#2b50c0;text-decoration:none}
    @media(max-width:560px){ .head h1{font-size:19px} .story,.rule{font-size:14px} }
  </style>
</head>
<body>
  <div class="head">
    <h1>🧠 记忆卡 · Ⅰ类「伪装」例外动词</h1>
    <p>它们 <b>る前是 i/e 段,看着像 Ⅱ类,其实全是 Ⅰ类</b> —— 用一个小故事一次记牢</p>
  </div>

  <div class="card">
    <svg viewBox="0 0 1040 470" role="img" aria-label="五格连环画:跑着回家,进门,才知道需要的钥匙忘带了">
      <!-- panels -->
      <g font-family="system-ui,'PingFang SC',sans-serif">
        <!-- ===== PANEL 1 走る ===== -->
        <g>
          <rect x="20" y="70" width="180" height="300" rx="16" fill="#fbf6ee" stroke="#ead9c2"/>
          <circle cx="40" cy="92" r="15" fill="#d9534f"/><text x="40" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">1</text>
          <!-- runner -->
          <g stroke="#2b3a67" stroke-width="5" stroke-linecap="round" fill="none">
            <line x1="60" y1="150" x2="78" y2="150"/><line x1="55" y1="170" x2="76" y2="170"/><line x1="60" y1="190" x2="78" y2="190"/>
            <circle cx="118" cy="150" r="15" fill="#ffd9a0" stroke="#2b3a67"/>
            <line x1="116" y1="166" x2="108" y2="205"/>
            <line x1="112" y1="178" x2="92" y2="170"/><line x1="112" y1="178" x2="134" y2="190"/>
            <line x1="108" y1="205" x2="90" y2="232"/><line x1="108" y1="205" x2="130" y2="225"/>
          </g>
          <text x="110" y="290" text-anchor="middle" font-size="34" font-weight="800" fill="#2b3a67">走る</text>
          <text x="110" y="316" text-anchor="middle" font-size="15" fill="#6b7280">はしる</text>
          <text x="110" y="344" text-anchor="middle" font-size="17" fill="#d9534f" font-weight="700">跑</text>
        </g>
        <!-- arrow -->
        <text x="214" y="225" text-anchor="middle" font-size="30" fill="#c9a978">➜</text>

        <!-- ===== PANEL 2 帰る ===== -->
        <g>
          <rect x="232" y="70" width="180" height="300" rx="16" fill="#fbf6ee" stroke="#ead9c2"/>
          <circle cx="252" cy="92" r="15" fill="#d9534f"/><text x="252" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">2</text>
          <!-- house -->
          <polygon points="322,128 372,168 272,168" fill="#e8896b" stroke="#2b3a67" stroke-width="3"/>
          <rect x="284" y="168" width="76" height="64" fill="#fff" stroke="#2b3a67" stroke-width="3"/>
          <rect x="312" y="196" width="22" height="36" fill="#c9a978" stroke="#2b3a67" stroke-width="2"/>
          <rect x="292" y="180" width="15" height="15" fill="#bcd4f0" stroke="#2b3a67" stroke-width="2"/>
          <text x="322" y="290" text-anchor="middle" font-size="34" font-weight="800" fill="#2b3a67">帰る</text>
          <text x="322" y="316" text-anchor="middle" font-size="15" fill="#6b7280">かえる</text>
          <text x="322" y="344" text-anchor="middle" font-size="17" fill="#d9534f" font-weight="700">回家</text>
        </g>
        <text x="426" y="225" text-anchor="middle" font-size="30" fill="#c9a978">➜</text>

        <!-- ===== PANEL 3 入る ===== -->
        <g>
          <rect x="444" y="70" width="180" height="300" rx="16" fill="#fbf6ee" stroke="#ead9c2"/>
          <circle cx="464" cy="92" r="15" fill="#d9534f"/><text x="464" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">3</text>
          <!-- doorway -->
          <rect x="516" y="128" width="56" height="104" fill="#fff" stroke="#2b3a67" stroke-width="3"/>
          <polygon points="516,128 516,232 496,222 496,138" fill="#c9a978" stroke="#2b3a67" stroke-width="2"/>
          <circle cx="564" cy="182" r="3.5" fill="#2b3a67"/>
          <!-- enter arrow -->
          <g stroke="#3a8f5b" stroke-width="6" stroke-linecap="round" fill="none">
            <line x1="470" y1="182" x2="500" y2="182"/>
            <polyline points="490,172 502,182 490,192"/>
          </g>
          <text x="534" y="290" text-anchor="middle" font-size="34" font-weight="800" fill="#2b3a67">入る</text>
          <text x="534" y="316" text-anchor="middle" font-size="15" fill="#6b7280">はいる</text>
          <text x="534" y="344" text-anchor="middle" font-size="17" fill="#d9534f" font-weight="700">进入</text>
        </g>
        <text x="638" y="225" text-anchor="middle" font-size="30" fill="#c9a978">➜</text>

        <!-- ===== PANEL 4 知る ===== -->
        <g>
          <rect x="656" y="70" width="180" height="300" rx="16" fill="#fbf6ee" stroke="#ead9c2"/>
          <circle cx="676" cy="92" r="15" fill="#d9534f"/><text x="676" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">4</text>
          <!-- lightbulb (idea) -->
          <g stroke="#e0a800" stroke-width="4" stroke-linecap="round">
            <line x1="746" y1="118" x2="746" y2="106"/><line x1="722" y1="128" x2="713" y2="119"/>
            <line x1="770" y1="128" x2="779" y2="119"/><line x1="710" y1="150" x2="698" y2="150"/><line x1="782" y1="150" x2="794" y2="150"/>
          </g>
          <circle cx="746" cy="150" r="20" fill="#ffe9a8" stroke="#2b3a67" stroke-width="3"/>
          <rect x="738" y="168" width="16" height="10" fill="#c9a978" stroke="#2b3a67" stroke-width="2"/>
          <!-- head -->
          <circle cx="746" cy="218" r="24" fill="#ffd9a0" stroke="#2b3a67" stroke-width="3"/>
          <circle cx="738" cy="214" r="2.6" fill="#2b3a67"/><circle cx="755" cy="214" r="2.6" fill="#2b3a67"/>
          <path d="M736 228 Q746 236 756 228" fill="none" stroke="#2b3a67" stroke-width="2.5"/>
          <text x="746" y="290" text-anchor="middle" font-size="34" font-weight="800" fill="#2b3a67">知る</text>
          <text x="746" y="316" text-anchor="middle" font-size="15" fill="#6b7280">しる</text>
          <text x="746" y="344" text-anchor="middle" font-size="17" fill="#d9534f" font-weight="700">知道</text>
        </g>
        <text x="850" y="225" text-anchor="middle" font-size="30" fill="#c9a978">➜</text>

        <!-- ===== PANEL 5 要る ===== -->
        <g>
          <rect x="868" y="70" width="152" height="300" rx="16" fill="#fbf6ee" stroke="#ead9c2"/>
          <circle cx="888" cy="92" r="15" fill="#d9534f"/><text x="888" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">5</text>
          <!-- key -->
          <g stroke="#2b3a67" stroke-width="3">
            <circle cx="916" cy="170" r="20" fill="#f5c542"/>
            <circle cx="916" cy="170" r="8" fill="#fbf6ee"/>
            <rect x="934" y="164" width="58" height="12" fill="#f5c542"/>
            <rect x="972" y="176" width="9" height="14" fill="#f5c542"/>
            <rect x="956" y="176" width="9" height="11" fill="#f5c542"/>
          </g>
          <text x="944" y="290" text-anchor="middle" font-size="34" font-weight="800" fill="#2b3a67">要る</text>
          <text x="944" y="316" text-anchor="middle" font-size="15" fill="#6b7280">いる</text>
          <text x="944" y="344" text-anchor="middle" font-size="17" fill="#d9534f" font-weight="700">需要</text>
        </g>
      </g>
    </svg>
  </div>

  <div class="story">
    📖 <b>故事</b>:我&nbsp;<b>跑</b>(走る<span class="kana"> はしる</span>)着&nbsp;<b>回家</b>(帰る<span class="kana"> かえる</span>),<b>进</b>(入る<span class="kana"> はいる</span>)了门,才&nbsp;<b>知道</b>(知る<span class="kana"> しる</span>)自己&nbsp;<b>需要</b>(要る<span class="kana"> いる</span>)的钥匙忘带了。
  </div>

  <div class="rule">
    🧭 <b>为什么要单独记?</b><br/>
    按规则:动词结尾是「る」、且<b>る前是 i/e 段</b>音 → 本该是 <b>Ⅱ类</b>。<br/>
    但这 5 个词「<b>帰る・入る・走る・要る・知る</b>」是<b>必背例外</b>,被特批成 <b>Ⅰ类</b>。<br/>
    判别口诀:<b>看着像 Ⅱ,其实是 Ⅰ</b>。遇到它们,直接判 <b>Ⅰ类</b>,不要再套「る前看段」。
  </div>

  <div class="back"><a href="../">← 返回学习仪表盘</a></div>
</body>
</html>
